<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f7;
  --panel: #ffffff;
  --panel2: #f7f8fc;
  --border: #e2e6f0;
  --blue: #2563eb;
  --blue2: #3b82f6;
  --blue-soft: #eff4ff;
  --blue-mid: #dbeafe;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --green: #059669;
  --green-soft: #ecfdf5;
  --red: #dc2626;
  --red-soft: #fef2f2;
  --amber: #d97706;
  --amber-soft: #fffbeb;
  --radius: 14px;
  --radius-sm: 8px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 30px; height: 30px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}

.logo-icon svg { width: 16px; height: 16px; fill: white; }

.logo-text {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge-mode {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--text2);
  transition: all 0.15s;
  user-select: none;
}
.badge-mode.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px;
  padding: 24px 32px;
  flex: 1;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
}

/* MAIN PANEL */
.main-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* INPUT AREA */
.input-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.input-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 14px 20px 0;
}

.input-wrap {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 10px 16px 14px;
}

.input-prefix {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  color: var(--blue);
  font-weight: 500;
  margin-right: 10px;
  user-select: none;
}

#exprInput {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 400;
  color: var(--text);
  border: none;
  outline: none;
  background: transparent;
  caret-color: var(--blue);
}

#exprInput::placeholder { color: var(--text3); font-size: 18px; }

.input-actions {
  display: flex;
  gap: 6px;
  padding: 0 16px 14px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.chip {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}
.chip:hover { background: var(--blue-soft); border-color: var(--blue2); color: var(--blue); }

.btn-eval {
  margin-left: auto;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 20px;
  border-radius: 8px;
  border: none;
  background: var(--blue);
  color: white;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-eval:hover { background: #1d4ed8; }
.btn-eval kbd {
  font-size: 10px;
  background: rgba(255,255,255,0.2);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
}

/* RESULT CARD */
.result-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: none;
}
.result-card.show { display: block; }
.result-card.ok { border-left: 3px solid var(--green); }
.result-card.err { border-left: 3px solid var(--red); }

.result-meta {
  font-size: 12px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
.result-dot.err { background: var(--red); }

.result-value {
  font-family: 'DM Mono', monospace;
  font-size: 40px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
  word-break: break-all;
}
.result-value.err { font-size: 16px; color: var(--red); }

.result-extra {
  margin-top: 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.result-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--blue-soft);
  color: var(--blue);
  border: 1px solid var(--blue-mid);
}

/* HISTORY */
.history-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.history-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.history-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
}

.btn-clear-hist {
  font-size: 12px;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  transition: color 0.12s;
}
.btn-clear-hist:hover { color: var(--red); }

.history-list {
  overflow-y: auto;
  flex: 1;
  padding: 8px 0;
  max-height: 340px;
}

.hist-empty {
  padding: 32px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

.hist-item {
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.hist-item:last-child { border-bottom: none; }
.hist-item:hover { background: var(--panel2); }

.hist-expr {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.hist-result {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}

.hist-result.err { color: var(--red); }

/* SIDEBAR */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.side-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.side-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
}

.fn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
}

.fn-btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 11px 6px;
  background: var(--panel);
  border: none;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.1s;
  text-align: center;
}
.fn-btn:hover { background: var(--blue-soft); color: var(--blue); }
.fn-btn span {
  display: block;
  font-size: 9px;
  color: var(--text3);
  margin-top: 2px;
  font-family: 'DM Sans', sans-serif;
}

/* CONSTANTS */
.const-list { padding: 6px 0; }

.const-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid var(--border);
}
.const-item:last-child { border-bottom: none; }
.const-item:hover { background: var(--blue-soft); }

.const-sym {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--blue);
  width: 28px;
}
.const-name {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
  padding: 0 8px;
}
.const-val {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

/* ANGLE TOGGLE */
.angle-row {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.angle-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.angle-toggle {
  display: flex;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.angle-opt {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 14px;
  cursor: pointer;
  color: var(--text3);
  transition: all 0.12s;
  border: none;
  background: none;
}
.angle-opt.active {
  background: var(--blue);
  color: white;
}

/* MEMORY ROW */
.mem-row {
  padding: 10px 16px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  border-top: 1px solid var(--border);
}
.mem-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.12s;
}
.mem-btn:hover { background: var(--green-soft); color: var(--green); border-color: #a7f3d0; }
.mem-val {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  padding: 5px 0;
  margin-left: auto;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zm7 0h5v5H9zM2 9h5v5H2zm7 0h5v5H9z"/></svg>
    </div>
    <span class="logo-text">CalcOS</span>
  </div>
  <div class="topbar-right">
    <span class="badge-mode active" id="modeRad" onclick="setAngle('RAD')">RAD</span>
    <span class="badge-mode" id="modeDeg" onclick="setAngle('DEG')">DEG</span>
  </div>
</div>

<div class="layout">

  <!-- MAIN -->
  <div class="main-panel">

    <div class="input-card">
      <div class="input-label">Expressão</div>
      <div class="input-wrap">
        <span class="input-prefix">›</span>
        <input id="exprInput" type="text" placeholder="sin(45) + sqrt(16) ..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="input-actions">
        <span class="chip" onclick="insertChip('sin(')">sin</span>
        <span class="chip" onclick="insertChip('cos(')">cos</span>
        <span class="chip" onclick="insertChip('tan(')">tan</span>
        <span class="chip" onclick="insertChip('sqrt(')">√</span>
        <span class="chip" onclick="insertChip('log(')">log</span>
        <span class="chip" onclick="insertChip('ln(')">ln</span>
        <span class="chip" onclick="insertChip('^')">xʸ</span>
        <span class="chip" onclick="insertChip('π')">π</span>
        <button class="btn-eval" onclick="evaluate()">Calcular <kbd>↵</kbd></button>
      </div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-meta">
        <span class="result-dot" id="resultDot"></span>
        <span id="resultExpr"></span>
      </div>
      <div class="result-value" id="resultValue"></div>
      <div class="result-extra" id="resultExtra"></div>
    </div>

    <div class="history-card">
      <div class="history-header">
        <span class="history-title">Histórico</span>
        <button class="btn-clear-hist" onclick="clearHistory()">Limpar</button>
      </div>
      <div class="history-list" id="histList">
        <div class="hist-empty" id="histEmpty">Nenhum cálculo ainda</div>
      </div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="side-card">
      <div class="side-header">Funções</div>
      <div class="fn-grid">
        <button class="fn-btn" onclick="insertFn('sin(')">sin<span>seno</span></button>
        <button class="fn-btn" onclick="insertFn('cos(')">cos<span>cosseno</span></button>
        <button class="fn-btn" onclick="insertFn('tan(')">tan<span>tangente</span></button>
        <button class="fn-btn" onclick="insertFn('asin(')">sin⁻¹<span>arcsen</span></button>
        <button class="fn-btn" onclick="insertFn('acos(')">cos⁻¹<span>arccos</span></button>
        <button class="fn-btn" onclick="insertFn('atan(')">tan⁻¹<span>arctan</span></button>
        <button class="fn-btn" onclick="insertFn('sqrt(')">√x<span>raiz</span></button>
        <button class="fn-btn" onclick="insertFn('cbrt(')">∛x<span>raiz cúb</span></button>
        <button class="fn-btn" onclick="insertFn('log(')">log<span>base 10</span></button>
        <button class="fn-btn" onclick="insertFn('log2(')">log₂<span>base 2</span></button>
        <button class="fn-btn" onclick="insertFn('ln(')">ln<span>natural</span></button>
        <button class="fn-btn" onclick="insertFn('exp(')">eˣ<span>exponenc.</span></button>
        <button class="fn-btn" onclick="insertFn('abs(')">|x|<span>módulo</span></button>
        <button class="fn-btn" onclick="insertFn('floor(')">⌊x⌋<span>piso</span></button>
        <button class="fn-btn" onclick="insertFn('ceil(')">⌈x⌉<span>teto</span></button>
        <button class="fn-btn" onclick="insertOp('!')">n!<span>fatorial</span></button>
        <button class="fn-btn" onclick="insertOp('^2')">x²<span>quadrado</span></button>
        <button class="fn-btn" onclick="insertOp('^')">xʸ<span>potência</span></button>
      </div>
      <div class="angle-row">
        <span class="angle-label">Ângulo</span>
        <div class="angle-toggle">
          <button class="angle-opt active" id="angRad" onclick="setAngle('RAD')">RAD</button>
          <button class="angle-opt" id="angDeg" onclick="setAngle('DEG')">DEG</button>
        </div>
      </div>
      <div class="mem-row">
        <button class="mem-btn" onclick="memOp('MS')">MS</button>
        <button class="mem-btn" onclick="memOp('MR')">MR</button>
        <button class="mem-btn" onclick="memOp('M+')">M+</button>
        <button class="mem-btn" onclick="memOp('M-')">M−</button>
        <button class="mem-btn" onclick="memOp('MC')">MC</button>
        <span class="mem-val" id="memVal">M: —</span>
      </div>
    </div>

    <div class="side-card">
      <div class="side-header">Constantes</div>
      <div class="const-list">
        <div class="const-item" onclick="insertConst('π')">
          <span class="const-sym">π</span>
          <span class="const-name">Pi</span>
          <span class="const-val">3.14159…</span>
        </div>
        <div class="const-item" onclick="insertConst('e')">
          <span class="const-sym">e</span>
          <span class="const-name">Euler</span>
          <span class="const-val">2.71828…</span>
        </div>
        <div class="const-item" onclick="insertConst('φ')">
          <span class="const-sym">φ</span>
          <span class="const-name">Razão áurea</span>
          <span class="const-val">1.61803…</span>
        </div>
        <div class="const-item" onclick="insertConst('√2')">
          <span class="const-sym">√2</span>
          <span class="const-name">Raiz de 2</span>
          <span class="const-val">1.41421…</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let angleMode = 'RAD';
let memory = null;
let history = [];

const input = document.getElementById('exprInput');

function setAngle(m) {
  angleMode = m;
  document.getElementById('angRad').classList.toggle('active', m==='RAD');
  document.getElementById('angDeg').classList.toggle('active', m==='DEG');
  document.getElementById('modeRad').classList.toggle('active', m==='RAD');
  document.getElementById('modeDeg').classList.toggle('active', m==='DEG');
}

function insertChip(t) {
  input.value += t;
  input.focus();
}

function insertFn(fn) {
  input.value += fn;
  input.focus();
}

function insertOp(op) {
  if (op === '^2') { input.value += '^2'; }
  else input.value += op;
  input.focus();
}

function insertConst(c) {
  input.value += c;
  input.focus();
}

function factorial(n) {
  if (n < 0 || !Number.isInteger(n)) return NaN;
  if (n > 170) return Infinity;
  let r = 1; for (let i=2;i<=n;i++) r*=i; return r;
}

function toJS(s) {
  s = s.replace(/π/g, '(Math.PI)');
  s = s.replace(/φ/g, '((1+Math.sqrt(5))/2)');
  s = s.replace(/√2/g, 'Math.SQRT2');
  s = s.replace(/(?<![a-zA-Z])e(?![a-zA-Z])/g, '(Math.E)');
  s = s.replace(/÷/g,'/')
       .replace(/×/g,'*')
       .replace(/−/g,'-');

  const rad = angleMode==='DEG';
  ['sin','cos','tan'].forEach(f => {
    s = s.replace(new RegExp(f+'\\(','g'), rad?`Math.${f}(Math.PI/180*(`:`Math.${f}(`);
  });
  ['asin','acos','atan'].forEach(f => {
    s = s.replace(new RegExp(f+'\\(','g'), rad?`(180/Math.PI)*Math.${f}(`:`Math.${f}(`);
  });

  s = s.replace(/sqrt\(/g,'Math.sqrt(');
  s = s.replace(/cbrt\(/g,'Math.cbrt(');
  s = s.replace(/log2\(/g,'Math.log2(');
  s = s.replace(/log\(/g,'Math.log10(');
  s = s.replace(/ln\(/g,'Math.log(');
  s = s.replace(/exp\(/g,'Math.exp(');
  s = s.replace(/abs\(/g,'Math.abs(');
  s = s.replace(/floor\(/g,'Math.floor(');
  s = s.replace(/ceil\(/g,'Math.ceil(');
  s = s.replace(/(\d+(?:\.\d+)?(?:e[+-]?\d+)?)\^(\d+(?:\.\d+)?)/g,'Math.pow($1,$2)');
  s = s.replace(/\^/g,'**');
  s = s.replace(/(\d+)!/g,(_,n)=>factorial(parseInt(n)));
  return s;
}

function fmt(n) {
  if (!isFinite(n)) return n>0?'∞':'-∞';
  if (isNaN(n)) return 'NaN';
  if (Math.abs(n)>=1e15||(Math.abs(n)<1e-10&&n!==0))
    return n.toExponential(8).replace(/\.?0+e/,'e');
  return parseFloat(n.toPrecision(12)).toString();
}

function extraInfo(n, expr) {
  const tags = [];
  if (Number.isInteger(n) && Math.abs(n)<1e9 && n>1) {
    let prime = true;
    for (let i=2;i<=Math.sqrt(n);i++) if(n%i===0){prime=false;break;}
    if(prime) tags.push('primo');
  }
  if(n===Math.PI) tags.push('= π');
  if(Math.abs(n-Math.E)<1e-10) tags.push('= e');
  if(n===0) tags.push('zero');
  if(n<0) tags.push('negativo');
  if(Number.isInteger(n)) tags.push('inteiro');
  const pct = (n*100).toFixed(4).replace(/\.?0+$/,'');
  if(!expr.includes('%') && Math.abs(n)<1000) tags.push(pct+'%');
  return tags;
}

function evaluate() {
  const raw = input.value.trim();
  if (!raw) return;

  const card = document.getElementById('resultCard');
  const dot = document.getElementById('resultDot');
  const valEl = document.getElementById('resultValue');
  const exprEl = document.getElementById('resultExpr');
  const extraEl = document.getElementById('resultExtra');

  card.className = 'result-card show';

  try {
    const js = toJS(raw);
    const result = Function('"use strict"; return ('+js+')')();
    if (typeof result !== 'number') throw new Error('Resultado inválido');
    const f = fmt(result);

    card.classList.add('ok');
    card.classList.remove('err');
    dot.className = 'result-dot';
    exprEl.textContent = raw;
    valEl.className = 'result-value';
    valEl.textContent = f;

    const tags = extraInfo(result, raw);
    extraEl.innerHTML = tags.map(t=>`<span class="result-tag">${t}</span>`).join('');

    addHistory(raw, f, false);
  } catch(err) {
    card.classList.add('err');
    card.classList.remove('ok');
    dot.className = 'result-dot err';
    exprEl.textContent = raw;
    valEl.className = 'result-value err';
    valEl.textContent = 'Expressão inválida — verifique os parênteses e funções';
    extraEl.innerHTML = '';
    addHistory(raw, 'Erro', true);
  }
}

function addHistory(expr, result, isErr) {
  history.unshift({ expr, result, isErr });
  if (history.length > 50) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('histList');
  const empty = document.getElementById('histEmpty');
  if (history.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    list.appendChild(empty);
    return;
  }
  list.innerHTML = history.map((h,i) => `
    <div class="hist-item" onclick="loadHistory(${i})">
      <span class="hist-expr">${h.expr}</span>
      <span class="hist-result${h.isErr?' err':''}">${h.isErr?'Erro':'= '+h.result}</span>
    </div>
  `).join('');
}

function loadHistory(i) {
  input.value = history[i].expr;
  input.focus();
}

function clearHistory() {
  history = [];
  renderHistory();
}

function memOp(cmd) {
  const cur = (() => {
    try {
      return Function('"use strict"; return ('+toJS(input.value.trim())+')')();
    } catch(_) {
      return parseFloat(document.getElementById('resultValue').textContent) || 0;
    }
  })();
  if (cmd==='MS') memory = cur;
  else if (cmd==='MR' && memory!==null) { input.value += fmt(memory); input.focus(); }
  else if (cmd==='M+' && memory!==null) memory += cur;
  else if (cmd==='M-' && memory!==null) memory -= cur;
  else if (cmd==='MC') memory = null;
  document.getElementById('memVal').textContent = memory!==null ? 'M: '+fmt(memory) : 'M: —';
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') evaluate();
});

// Live preview
input.addEventListener('input', () => {
  const raw = input.value.trim();
  if (!raw) return;
  try {
    const r = Function('"use strict"; return ('+toJS(raw)+')')();
    if (typeof r === 'number' && isFinite(r)) {
      document.getElementById('resultCard').className = 'result-card show ok';
      document.getElementById('resultDot').className = 'result-dot';
      document.getElementById('resultExpr').textContent = raw;
      document.getElementById('resultValue').className = 'result-value';
      document.getElementById('resultValue').textContent = fmt(r);
      document.getElementById('resultExtra').innerHTML = '';
    }
  } catch(_) {}
});
</script>
