<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #03060f;
  --surface: #070d1a;
  --surface2: #0b1222;
  --surface3: #0f1830;
  --border: #1a2a4a;
  --border2: #1e3560;
  --accent: #1e6fff;
  --accent2: #4d8fff;
  --accent-glow: rgba(30,111,255,0.25);
  --accent-glow2: rgba(30,111,255,0.08);
  --text: #d0e4ff;
  --text2: #7a9acc;
  --text3: #3a5a8a;
  --danger: #ff4040;
  --warn: #ff9020;
  --green: #20d68a;
}

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  padding: 16px;
}

.calc {
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 0 60px rgba(30,111,255,0.1), inset 0 1px 0 rgba(30,111,255,0.15);
  position: relative;
}

.calc::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.6;
}

/* BRAND */
.brand {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 4px;
}
.brand-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text3);
}
.brand-model {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.1em;
  opacity: 0.7;
}

/* DISPLAY */
.display {
  background: #020509;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px 12px;
  margin-bottom: 12px;
  min-height: 138px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.display::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(30,111,255,0.015) 2px, rgba(30,111,255,0.015) 4px);
  pointer-events: none;
}

.display-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.status-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.badge-angle {
  background: rgba(30,111,255,0.15);
  color: var(--accent2);
  border: 1px solid rgba(30,111,255,0.3);
  cursor: pointer;
  transition: all 0.15s;
}
.badge-angle:hover { background: rgba(30,111,255,0.3); }

.badge-mem {
  background: rgba(32,214,138,0.1);
  color: var(--green);
  border: 1px solid rgba(32,214,138,0.25);
  display: none;
}
.badge-mem.show { display: inline-block; }

.badge-2nd {
  background: rgba(255,144,32,0.12);
  color: var(--warn);
  border: 1px solid rgba(255,144,32,0.3);
  display: none;
}
.badge-2nd.show { display: inline-block; }

.display-bottom { }

.history-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  text-align: right;
  min-height: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.expr-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  text-align: right;
  min-height: 18px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.result-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 38px;
  font-weight: 700;
  color: var(--text);
  text-align: right;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s, text-shadow 0.15s;
  text-shadow: 0 0 20px rgba(30,111,255,0.3);
}

.result-line.active { color: #fff; text-shadow: 0 0 30px rgba(30,111,255,0.5); }
.result-line.error { color: var(--danger); font-size: 18px; text-shadow: none; }

/* SECTION LABELS */
.section-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 4px 2px 3px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  margin-top: 8px;
}

/* KEYPAD */
.keypad { display: flex; flex-direction: column; gap: 6px; }

.row {
  display: grid;
  gap: 5px;
}

.r5 { grid-template-columns: repeat(5, 1fr); }
.r4 { grid-template-columns: repeat(4, 1fr); }
.r4-wide { grid-template-columns: 2fr 1fr 1fr 1fr; }

button {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 13px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  height: 46px;
  transition: transform 0.07s, filter 0.1s, box-shadow 0.1s;
  position: relative;
  letter-spacing: 0.03em;
}

button:active { transform: scale(0.93); }
button:hover { filter: brightness(1.2); }

/* FN - scientific functions */
button.fn {
  background: var(--surface3);
  color: var(--accent2);
  border: 1px solid var(--border);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
}

button.fn2 {
  background: var(--surface3);
  color: var(--warn);
  border: 1px solid rgba(255,144,32,0.2);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
}

/* NUM */
button.num {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  font-size: 18px;
  font-weight: 700;
}

/* OP */
button.op {
  background: #0a1a3d;
  color: var(--accent2);
  border: 1px solid var(--border2);
  font-size: 20px;
  box-shadow: 0 0 12px rgba(30,111,255,0.1);
}

/* EQUALS */
button.eq {
  background: var(--accent);
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  box-shadow: 0 0 20px rgba(30,111,255,0.35);
  border: 1px solid #3a7fff;
}

/* CLEAR / DEL */
button.clear {
  background: rgba(255,64,64,0.08);
  color: var(--danger);
  border: 1px solid rgba(255,64,64,0.2);
  font-size: 13px;
}

button.del {
  background: rgba(255,64,64,0.06);
  color: #aa3030;
  border: 1px solid rgba(255,64,64,0.12);
  font-size: 18px;
}

button.mem {
  background: rgba(32,214,138,0.06);
  color: #20a070;
  border: 1px solid rgba(32,214,138,0.15);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

/* second function indicator */
button.fn.lit {
  background: rgba(255,144,32,0.12);
  color: var(--warn);
  border-color: rgba(255,144,32,0.3);
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
  opacity: 0.5;
}
</style>
</head>
<body>
<div class="calc">
  <div class="brand">
    <span class="brand-name">Scientific Calc</span>
    <span class="brand-model">SCI-7X PRO</span>
  </div>

  <div class="display">
    <div class="display-top">
      <div class="status-row">
        <span class="badge badge-angle" id="angleBadge" onclick="pressAngle()" title="Toggle DEG/RAD">RAD</span>
        <span class="badge badge-2nd" id="badge2nd">2nd</span>
        <span class="badge badge-mem" id="badgeMem">M</span>
      </div>
    </div>
    <div class="display-bottom">
      <div class="history-line" id="histLine"></div>
      <div class="expr-line" id="exprLine"></div>
      <div class="result-line" id="resultLine">0</div>
    </div>
  </div>

  <div class="keypad">

    <!-- ROW: Memory -->
    <div class="row r5">
      <button class="mem" onclick="pressMem('MC')">MC</button>
      <button class="mem" onclick="pressMem('MR')">MR</button>
      <button class="mem" onclick="pressMem('MS')">MS</button>
      <button class="mem" onclick="pressMem('M+')">M+</button>
      <button class="mem" onclick="pressMem('M-')">M−</button>
    </div>

    <div class="divider"></div>

    <!-- ROW: Trig -->
    <div class="row r5">
      <button class="fn" id="btn-sin" onclick="pressFn2('sin(','asin(','btn-sin')">sin</button>
      <button class="fn" id="btn-cos" onclick="pressFn2('cos(','acos(','btn-cos')">cos</button>
      <button class="fn" id="btn-tan" onclick="pressFn2('tan(','atan(','btn-tan')">tan</button>
      <button class="fn" id="btn-log" onclick="pressFn2('log(','log2(','btn-log')">log</button>
      <button class="fn" id="btn-ln"  onclick="pressFn2('ln(','exp(','btn-ln')">ln</button>
    </div>

    <!-- ROW: Powers & roots -->
    <div class="row r5">
      <button class="fn" onclick="pressOp('^2')">x²</button>
      <button class="fn" id="btn-sqrt" onclick="pressFn2('sqrt(','cbrt(','btn-sqrt')">√x</button>
      <button class="fn" onclick="pressOp('^')">xʸ</button>
      <button class="fn" onclick="pressFn('1/(')">1/x</button>
      <button class="fn" onclick="pressOp('!')">n!</button>
    </div>

    <!-- ROW: Extra sci -->
    <div class="row r5">
      <button class="fn" onclick="pressConst('π')">π</button>
      <button class="fn" onclick="pressConst('e')">e</button>
      <button class="fn" onclick="pressFn('abs(')">|x|</button>
      <button class="fn" onclick="pressOp('(')">(</button>
      <button class="fn" onclick="pressOp(')')">)</button>
    </div>

    <!-- 2nd toggle -->
    <div class="row r5">
      <button class="fn" id="btn2nd" onclick="toggle2nd()" style="color:var(--warn); border-color:rgba(255,144,32,0.25);">2nd</button>
      <button class="fn" onclick="pressPercent()">%</button>
      <button class="fn" onclick="pressEE()">EE</button>
      <button class="fn" onclick="pressRand()">RND</button>
      <button class="fn" onclick="pressFn('floor(')">⌊x⌋</button>
    </div>

    <div class="divider"></div>

    <!-- Standard keypad -->
    <div class="row r4">
      <button class="clear" onclick="pressClear()">AC</button>
      <button class="del"   onclick="pressDel()">⌫</button>
      <button class="fn"    onclick="pressToggleSign()">±</button>
      <button class="op"    onclick="pressOp('÷')">÷</button>
    </div>

    <div class="row r4">
      <button class="num" onclick="pressNum('7')">7</button>
      <button class="num" onclick="pressNum('8')">8</button>
      <button class="num" onclick="pressNum('9')">9</button>
      <button class="op"  onclick="pressOp('×')">×</button>
    </div>

    <div class="row r4">
      <button class="num" onclick="pressNum('4')">4</button>
      <button class="num" onclick="pressNum('5')">5</button>
      <button class="num" onclick="pressNum('6')">6</button>
      <button class="op"  onclick="pressOp('−')">−</button>
    </div>

    <div class="row r4">
      <button class="num" onclick="pressNum('1')">1</button>
      <button class="num" onclick="pressNum('2')">2</button>
      <button class="num" onclick="pressNum('3')">3</button>
      <button class="op"  onclick="pressOp('+')">+</button>
    </div>

    <div class="row" style="grid-template-columns: 2fr 1fr 1fr;">
      <button class="num" onclick="pressNum('0')" style="font-size:18px;font-weight:700;">0</button>
      <button class="num" onclick="pressDot()">.</button>
      <button class="eq"  onclick="pressEquals()">=</button>
    </div>

  </div>
</div>

<script>
let expr = '';
let lastResult = '0';
let justEvaled = false;
let angleMode = 'RAD';
let secondMode = false;
let memory = 0;
let memHasValue = false;

const resultEl  = document.getElementById('resultLine');
const exprEl    = document.getElementById('exprLine');
const histEl    = document.getElementById('histLine');
const angleBadge = document.getElementById('angleBadge');
const badge2nd   = document.getElementById('badge2nd');
const badgeMem   = document.getElementById('badgeMem');

function updateDisplay() {
  resultEl.className = 'result-line';
  if (expr === '') {
    resultEl.textContent = lastResult || '0';
    exprEl.textContent = '';
  } else {
    exprEl.textContent = expr;
    const prev = tryEval(expr);
    if (prev !== null) {
      resultEl.textContent = fmt(prev);
      resultEl.classList.add('active');
    } else {
      resultEl.textContent = expr.length > 14 ? '...' + expr.slice(-14) : expr;
    }
  }
}

function fmt(n) {
  if (typeof n === 'string') return n;
  if (isNaN(n)) return 'Erro';
  if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
  if (Math.abs(n) >= 1e15 || (Math.abs(n) < 1e-10 && n !== 0))
    return n.toExponential(6).replace(/\.?0+e/, 'e');
  return parseFloat(n.toPrecision(12)).toString();
}

function factorial(n) {
  if (n < 0 || !Number.isInteger(n)) return NaN;
  if (n > 170) return Infinity;
  let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
}

function toJS(s) {
  s = s.replace(/π/g, '(Math.PI)');
  s = s.replace(/(?<![a-zA-Z])e(?![a-zA-Z])/g, '(Math.E)');
  s = s.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-');

  const rad = angleMode === 'DEG';
  ['sin','cos','tan'].forEach(f => {
    s = s.replace(new RegExp(f + '\\(', 'g'), rad ? `Math.${f}(Math.PI/180*(` : `Math.${f}(`);
  });
  ['asin','acos','atan'].forEach(f => {
    s = s.replace(new RegExp(f + '\\(', 'g'), rad ? `(180/Math.PI)*Math.${f}(` : `Math.${f}(`);
  });
  if (rad) {
    // close the extra paren we opened for deg conversion
    s = s.replace(/Math\.(sin|cos|tan)\(Math\.PI\/180\*\(([^)]*)\)/g,
      (_, fn, inner) => `Math.${fn}(Math.PI/180*(${inner})`);
  }

  s = s.replace(/sqrt\(/g, 'Math.sqrt(');
  s = s.replace(/cbrt\(/g, 'Math.cbrt(');
  s = s.replace(/log2\(/g, 'Math.log2(');
  s = s.replace(/log\(/g, 'Math.log10(');
  s = s.replace(/ln\(/g, 'Math.log(');
  s = s.replace(/exp\(/g, 'Math.exp(');
  s = s.replace(/abs\(/g, 'Math.abs(');
  s = s.replace(/floor\(/g, 'Math.floor(');
  s = s.replace(/1\/\(/g, '1/(');

  s = s.replace(/(\d+(?:\.\d+)?(?:e[+-]?\d+)?)\^2/g, 'Math.pow($1,2)');
  s = s.replace(/(\d+(?:\.\d+)?(?:e[+-]?\d+)?)\^(\d+(?:\.\d+)?)/g, 'Math.pow($1,$2)');
  s = s.replace(/\^/g, '**');

  s = s.replace(/(\d+)!/g, (_, n) => factorial(parseInt(n)));
  return s;
}

function tryEval(e) {
  try {
    const js = toJS(e);
    const r = Function('"use strict"; return (' + js + ')')();
    if (typeof r === 'number') return r;
  } catch(_) {}
  return null;
}

function pressNum(d) {
  if (justEvaled) { expr = ''; justEvaled = false; }
  expr += d;
  updateDisplay();
}

function pressDot() {
  if (justEvaled) { expr = '0'; justEvaled = false; }
  const parts = expr.split(/[+\-×÷\^(]/);
  if (parts[parts.length-1].includes('.')) return;
  if (parts[parts.length-1] === '') expr += '0';
  expr += '.';
  updateDisplay();
}

function pressOp(op) {
  justEvaled = false;
  if (op === '^2') { expr += '^2'; updateDisplay(); return; }
  if (op === '!') { expr += '!'; pressEquals(); return; }
  const ops = ['+','−','×','÷','^'];
  if (ops.includes(expr.slice(-1))) expr = expr.slice(0,-1);
  expr += op;
  updateDisplay();
}

function pressFn(fn) {
  if (justEvaled) { expr = fn + lastResult + ')'; justEvaled = false; }
  else expr += fn;
  updateDisplay();
}

function pressFn2(primary, secondary, btnId) {
  pressFn(secondMode ? secondary : primary);
  if (secondMode) toggle2nd();
}

function pressConst(c) {
  if (justEvaled) { expr = ''; justEvaled = false; }
  expr += c;
  updateDisplay();
}

function pressClear() {
  expr = ''; lastResult = '0'; justEvaled = false;
  histEl.textContent = ''; exprEl.textContent = '';
  resultEl.textContent = '0'; resultEl.className = 'result-line';
}

function pressDel() {
  if (justEvaled) { expr = ''; justEvaled = false; updateDisplay(); return; }
  expr = expr.slice(0,-1);
  updateDisplay();
}

function pressToggleSign() {
  if (expr === '' && lastResult !== '0') {
    lastResult = fmt(-parseFloat(lastResult));
    resultEl.textContent = lastResult; return;
  }
  const m = expr.match(/^(.*[+\−×÷(]|^)(-?)(\d[\d.]*)$/);
  if (m) { expr = m[1] + (m[2] === '-' ? '' : '-') + m[3]; updateDisplay(); }
}

function pressPercent() {
  if (!expr) return;
  const n = tryEval(expr);
  if (n !== null) { expr = fmt(n / 100); updateDisplay(); }
}

function pressEE() {
  if (justEvaled) { expr = lastResult + 'e'; justEvaled = false; }
  else expr += 'e';
  updateDisplay();
}

function pressRand() {
  const r = fmt(Math.random());
  if (justEvaled) { expr = r; justEvaled = false; }
  else expr += r;
  updateDisplay();
}

function pressEquals() {
  if (expr === '') return;
  const result = tryEval(expr);
  if (result === null) {
    resultEl.textContent = 'Erro de sintaxe';
    resultEl.className = 'result-line error'; return;
  }
  const f = fmt(result);
  histEl.textContent = expr.slice(0, 40) + ' =';
  exprEl.textContent = '';
  lastResult = f; expr = ''; justEvaled = true;
  resultEl.textContent = f;
  resultEl.className = 'result-line active';
}

function pressAngle() {
  angleMode = angleMode === 'RAD' ? 'DEG' : 'RAD';
  angleBadge.textContent = angleMode;
}

function toggle2nd() {
  secondMode = !secondMode;
  badge2nd.classList.toggle('show', secondMode);
  document.getElementById('btn2nd').classList.toggle('lit', secondMode);
  // Update button labels
  const labels = secondMode
    ? { 'btn-sin':'sin⁻¹','btn-cos':'cos⁻¹','btn-tan':'tan⁻¹','btn-log':'log₂','btn-ln':'eˣ','btn-sqrt':'∛x' }
    : { 'btn-sin':'sin','btn-cos':'cos','btn-tan':'tan','btn-log':'log','btn-ln':'ln','btn-sqrt':'√x' };
  for (const [id, label] of Object.entries(labels)) {
    document.getElementById(id).textContent = label;
  }
}

function pressMem(cmd) {
  const cur = tryEval(expr) ?? parseFloat(lastResult) ?? 0;
  if (cmd === 'MC') { memory = 0; memHasValue = false; badgeMem.classList.remove('show'); }
  else if (cmd === 'MR') {
    if (memHasValue) {
      if (justEvaled) { expr = fmt(memory); justEvaled = false; }
      else expr += fmt(memory);
      updateDisplay();
    }
  }
  else if (cmd === 'MS') {
    if (!isNaN(cur)) { memory = cur; memHasValue = true; badgeMem.classList.add('show'); }
  }
  else if (cmd === 'M+') {
    if (!isNaN(cur)) { memory += cur; memHasValue = true; badgeMem.classList.add('show'); }
  }
  else if (cmd === 'M-') {
    if (!isNaN(cur)) { memory -= cur; memHasValue = true; badgeMem.classList.add('show'); }
  }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) return;
  const k = e.key;
  if (k >= '0' && k <= '9') pressNum(k);
  else if (k === '.') pressDot();
  else if (k === '+') pressOp('+');
  else if (k === '-') pressOp('−');
  else if (k === '*') pressOp('×');
  else if (k === '/') { e.preventDefault(); pressOp('÷'); }
  else if (k === '^') pressOp('^');
  else if (k === '(') pressOp('(');
  else if (k === ')') pressOp(')');
  else if (k === '%') pressPercent();
  else if (k === 'Enter' || k === '=') pressEquals();
  else if (k === 'Backspace') pressDel();
  else if (k === 'Escape') pressClear();
});
</script>
</body>
</html>
