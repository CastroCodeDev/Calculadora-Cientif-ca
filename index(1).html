<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCI-7X PRO</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;
  --s1:#0e1119;
  --s2:#141925;
  --s3:#1b2130;
  --bd:rgba(255,255,255,0.055);
  --bd2:rgba(255,255,255,0.1);
  --bd3:rgba(255,255,255,0.16);
  --accent:#4a8cf5;
  --alow:rgba(74,140,245,0.12);
  --amid:rgba(74,140,245,0.25);
  --green:#2ec4a0;
  --glow:rgba(46,196,160,0.12);
  --text:#d8e0f0;
  --muted:#4a5270;
  --dim:#2a2f45;
  --danger:#e85d5d;
  --dangerlow:rgba(232,93,93,0.1);
  --amber:#d4882a;
  --amberlow:rgba(212,136,42,0.1);
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* LAYOUT */
.app{
  max-width:900px;
  margin:0 auto;
  min-height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:24px 20px;
  gap:20px;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;letter-spacing:0.22em;
  color:var(--muted);text-transform:uppercase;
}
.brand-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green)}50%{opacity:.4;box-shadow:0 0 2px var(--green)}}
.header-badges{display:flex;gap:6px}
.chip{
  font-family:var(--mono);font-size:9px;letter-spacing:0.14em;
  text-transform:uppercase;padding:4px 10px;border-radius:5px;
  border:0.5px solid var(--bd2);background:var(--s2);color:var(--muted);
  cursor:default;transition:.15s;
}
.chip.on{background:var(--alow);color:var(--accent);border-color:rgba(74,140,245,0.35)}

/* MAIN CONTENT */
.main{
  display:grid;
  grid-template-columns:1fr 340px;
  gap:16px;
  align-items:start;
}

/* LEFT — DISPLAY */
.left{display:flex;flex-direction:column;gap:12px}

.display-card{
  background:var(--s1);
  border:0.5px solid var(--bd2);
  border-radius:16px;
  padding:28px 28px 22px;
  position:relative;
  overflow:hidden;
}
.display-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.4;
}
.display-label{
  font-family:var(--mono);font-size:9px;letter-spacing:0.2em;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center;
}
.expr-out{
  font-family:var(--mono);font-size:14px;color:var(--muted);
  min-height:20px;text-align:right;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  margin-bottom:8px;
}
.main-out{
  font-family:var(--mono);font-size:52px;font-weight:700;
  text-align:right;letter-spacing:-2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  min-height:64px;color:var(--text);
  transition:color .15s;
}
.main-out.err{color:var(--danger);font-size:28px;letter-spacing:0}

.metrics{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;margin-top:20px;
  background:var(--bd);border-radius:10px;overflow:hidden;
}
.metric{
  background:var(--s2);padding:10px 14px;
  display:flex;flex-direction:column;gap:3px;
}
.metric-l{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.metric-v{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500}

/* MEMORY CARD */
.mem-card{
  background:var(--s1);border:0.5px solid var(--bd);
  border-radius:12px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.mem-info{display:flex;flex-direction:column;gap:3px}
.mem-tag{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.mem-num{font-family:var(--mono);font-size:15px;color:var(--accent);font-weight:500}
.mem-btns{display:flex;gap:5px;flex-wrap:wrap}
.mbtn{
  font-family:var(--mono);font-size:10px;padding:5px 10px;
  border-radius:6px;border:0.5px solid var(--bd2);
  background:var(--s2);color:var(--muted);cursor:pointer;
  transition:.13s;letter-spacing:.06em;
}
.mbtn:hover{background:var(--s3);color:var(--text);border-color:var(--bd3)}
.mbtn:active{transform:scale(.95)}

/* MODE SWITCH */
.mode-switch{
  display:flex;background:var(--s1);border:0.5px solid var(--bd);
  border-radius:10px;padding:4px;gap:4px;
}
.mode-btn{
  flex:1;font-family:var(--mono);font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;padding:7px 0;border-radius:7px;
  border:none;background:transparent;color:var(--muted);cursor:pointer;
  transition:.15s;
}
.mode-btn.on{background:var(--alow);color:var(--accent);border:0.5px solid rgba(74,140,245,.3)}

/* RIGHT — CONTROLS */
.right{display:flex;flex-direction:column;gap:14px}

/* FUNCTION PANEL */
.fn-panel{
  background:var(--s1);border:0.5px solid var(--bd);
  border-radius:14px;padding:16px;
}
.panel-head{
  font-family:var(--mono);font-size:9px;letter-spacing:.2em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:12px;padding-bottom:10px;
  border-bottom:0.5px solid var(--bd);
  display:flex;justify-content:space-between;
}
.fn-group{margin-bottom:12px}
.fn-group-label{
  font-size:9px;font-family:var(--mono);letter-spacing:.15em;
  color:var(--dim);text-transform:uppercase;margin-bottom:6px;
}
.fn-chips{display:flex;flex-wrap:wrap;gap:5px}
.fn-btn{
  font-family:var(--mono);font-size:11px;
  padding:6px 12px;border-radius:7px;
  border:0.5px solid var(--bd2);background:var(--s2);
  color:var(--text);cursor:pointer;transition:.13s;
  white-space:nowrap;
}
.fn-btn:hover{background:var(--s3);border-color:var(--bd3)}
.fn-btn:active{transform:scale(.95)}
.fn-btn.green{background:var(--glow);border-color:rgba(46,196,160,.25);color:var(--green)}
.fn-btn.green:hover{background:rgba(46,196,160,.2)}
.fn-btn.amber{background:var(--amberlow);border-color:rgba(212,136,42,.25);color:var(--amber)}

/* NUMPAD — horizontal rows, not a phone grid */
.numpad{
  background:var(--s1);border:0.5px solid var(--bd);
  border-radius:14px;padding:16px;
  display:flex;flex-direction:column;gap:6px;
}
.num-row{display:flex;gap:5px}
.nk{
  font-family:var(--mono);
  flex:1;height:46px;border-radius:8px;
  border:0.5px solid var(--bd2);
  background:var(--s2);color:var(--text);
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.12s;user-select:none;
}
.nk:hover{background:var(--s3);border-color:var(--bd3)}
.nk:active{transform:scale(.95)}
.nk.op{background:var(--alow);border-color:rgba(74,140,245,.25);color:var(--accent);font-size:16px}
.nk.op:hover{background:var(--amid)}
.nk.eq{background:rgba(74,140,245,.22);border-color:rgba(74,140,245,.45);color:#8fc0ff;font-size:18px;font-weight:700}
.nk.eq:hover{background:rgba(74,140,245,.32)}
.nk.clr{background:var(--dangerlow);border-color:rgba(232,93,93,.25);color:var(--danger)}
.nk.clr:hover{background:rgba(232,93,93,.18)}
.nk.wide{flex:2}
.nk.sm{font-size:11px}

/* FOOTER */
footer{
  text-align:center;font-size:10px;font-family:var(--mono);
  letter-spacing:.15em;color:var(--muted);
  border-top:0.5px solid var(--bd);padding-top:16px;
}

/* RESPONSIVE */
@media(max-width:700px){
  .main{grid-template-columns:1fr}
  .right{order:-1}
  .main-out{font-size:36px}
  .metrics{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      SCI-7X PRO &nbsp;·&nbsp; Scientific Calculator
    </div>
    <div class="header-badges">
      <span class="chip on" id="badge-mode">RAD</span>
      <span class="chip" id="badge-mem" style="display:none">MEM</span>
    </div>
  </header>

  <div class="main">

    <!-- LEFT -->
    <div class="left">
      <div class="display-card">
        <div class="display-label">
          <span>output</span>
          <span id="flag-err" style="color:var(--danger);display:none;font-size:9px;letter-spacing:.1em">ERRO</span>
        </div>
        <div class="expr-out" id="expr-out"></div>
        <div class="main-out" id="main-out">0</div>
        <div class="metrics">
          <div class="metric">
            <span class="metric-l">ANS</span>
            <span class="metric-v" id="m-ans">—</span>
          </div>
          <div class="metric">
            <span class="metric-l">MEM</span>
            <span class="metric-v" id="m-mem">—</span>
          </div>
          <div class="metric">
            <span class="metric-l">MODE</span>
            <span class="metric-v" id="m-mode">RAD</span>
          </div>
        </div>
      </div>

      <div class="mode-switch">
        <button class="mode-btn on" onclick="setMode('RAD')">RAD — Radianos</button>
        <button class="mode-btn" onclick="setMode('DEG')">DEG — Graus</button>
      </div>

      <div class="mem-card">
        <div class="mem-info">
          <span class="mem-tag">memória</span>
          <span class="mem-num" id="mem-disp">0</span>
        </div>
        <div class="mem-btns">
          <button class="mbtn" onclick="memClear()">MC</button>
          <button class="mbtn" onclick="memRecall()">MR</button>
          <button class="mbtn" onclick="memStore()">MS</button>
          <button class="mbtn" onclick="memAdd()">M+</button>
          <button class="mbtn" onclick="memSub()">M−</button>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">

      <!-- FUNCTIONS -->
      <div class="fn-panel">
        <div class="panel-head">
          <span>funções científicas</span>
        </div>

        <div class="fn-group">
          <div class="fn-group-label">trigonometria</div>
          <div class="fn-chips">
            <button class="fn-btn" onclick="applyFn('sin')">sin</button>
            <button class="fn-btn" onclick="applyFn('cos')">cos</button>
            <button class="fn-btn" onclick="applyFn('tan')">tan</button>
            <button class="fn-btn" onclick="applyFn('asin')">sin⁻¹</button>
            <button class="fn-btn" onclick="applyFn('acos')">cos⁻¹</button>
            <button class="fn-btn" onclick="applyFn('atan')">tan⁻¹</button>
          </div>
        </div>

        <div class="fn-group">
          <div class="fn-group-label">logaritmo / exponencial</div>
          <div class="fn-chips">
            <button class="fn-btn" onclick="applyFn('log')">log₁₀</button>
            <button class="fn-btn" onclick="applyFn('ln')">ln</button>
            <button class="fn-btn" onclick="applyFn('log2')">log₂</button>
            <button class="fn-btn" onclick="applyFn('x2')">x²</button>
            <button class="fn-btn" onclick="applyFn('pow')">xʸ</button>
            <button class="fn-btn" onclick="applyFn('exp')">×10ⁿ</button>
          </div>
        </div>

        <div class="fn-group">
          <div class="fn-group-label">raiz / arredondamento</div>
          <div class="fn-chips">
            <button class="fn-btn" onclick="applyFn('sqrt')">√x</button>
            <button class="fn-btn" onclick="applyFn('cbrt')">∛x</button>
            <button class="fn-btn" onclick="applyFn('floor')">⌊x⌋</button>
            <button class="fn-btn" onclick="applyFn('ceil')">⌈x⌉</button>
            <button class="fn-btn" onclick="applyFn('abs')">|x|</button>
            <button class="fn-btn" onclick="applyFn('rnd')">round</button>
          </div>
        </div>

        <div class="fn-group">
          <div class="fn-group-label">outros</div>
          <div class="fn-chips">
            <button class="fn-btn" onclick="applyFn('inv')">1/x</button>
            <button class="fn-btn" onclick="applyFn('fact')">n!</button>
            <button class="fn-btn" onclick="applyFn('pct')">%</button>
            <button class="fn-btn green" onclick="insertConst('pi')">π</button>
            <button class="fn-btn green" onclick="insertConst('e')">e</button>
          </div>
        </div>
      </div>

      <!-- NUMPAD — structured as rows, not phone grid -->
      <div class="numpad">
        <div class="num-row">
          <div class="nk clr sm" onclick="clearAll()">AC</div>
          <div class="nk sm" onclick="backspace()">⌫</div>
          <div class="nk sm" onclick="toggleSign()">±</div>
          <div class="nk sm" onclick="inputParen('(')">(</div>
          <div class="nk sm" onclick="inputParen(')')">)</div>
        </div>
        <div class="num-row">
          <div class="nk" onclick="inputNum('7')">7</div>
          <div class="nk" onclick="inputNum('8')">8</div>
          <div class="nk" onclick="inputNum('9')">9</div>
          <div class="nk op" onclick="inputOp('/')">÷</div>
        </div>
        <div class="num-row">
          <div class="nk" onclick="inputNum('4')">4</div>
          <div class="nk" onclick="inputNum('5')">5</div>
          <div class="nk" onclick="inputNum('6')">6</div>
          <div class="nk op" onclick="inputOp('*')">×</div>
        </div>
        <div class="num-row">
          <div class="nk" onclick="inputNum('1')">1</div>
          <div class="nk" onclick="inputNum('2')">2</div>
          <div class="nk" onclick="inputNum('3')">3</div>
          <div class="nk op" onclick="inputOp('-')">−</div>
        </div>
        <div class="num-row">
          <div class="nk wide" onclick="inputNum('0')">0</div>
          <div class="nk" onclick="inputDot()">.</div>
          <div class="nk op" onclick="inputOp('+')">+</div>
        </div>
        <div class="num-row">
          <div class="nk eq" style="flex:1" onclick="calculate()">=</div>
        </div>
      </div>

    </div><!-- /right -->
  </div><!-- /main -->

  <footer>SCI-7X PRO &nbsp;·&nbsp; castrocodedev &nbsp;·&nbsp; scientific dashboard</footer>
</div>

<script>
let cur='0',expr='',mem=0,ans=null,mode='RAD';
let pendOp=null,pendVal=null,justCalc=false;

function fmt(v){
  if(!isFinite(v))return'ERROR';
  if(Number.isInteger(v)&&Math.abs(v)<1e15)return v.toString();
  return parseFloat(v.toPrecision(10)).toString();
}

function render(){
  const o=document.getElementById('main-out');
  o.textContent=cur;
  o.className='main-out'+(cur==='ERROR'?' err':'');
  document.getElementById('expr-out').textContent=expr;
  document.getElementById('m-ans').textContent=ans!==null?fmt(ans):'—';
  document.getElementById('m-mem').textContent=mem!==0?fmt(mem):'—';
  document.getElementById('m-mode').textContent=mode;
  document.getElementById('mem-disp').textContent=fmt(mem);
  document.getElementById('badge-mode').textContent=mode;
  document.getElementById('badge-mem').style.display=mem!==0?'':'none';
  document.getElementById('flag-err').style.display=cur==='ERROR'?'':'none';
}

function inputNum(n){
  if(cur==='ERROR'){cur='0';expr='';}
  if(justCalc){cur='0';expr='';justCalc=false;}
  cur=cur==='0'?n:(cur.length<18?cur+n:cur);
  render();
}
function inputDot(){
  if(cur==='ERROR')cur='0';
  if(justCalc){cur='0';expr='';justCalc=false;}
  if(!cur.includes('.'))cur+='.';
  render();
}
function inputOp(op){
  if(cur==='ERROR')return;
  const lb={'+':'+','-':'−','*':'×','/':'÷'};
  if(pendOp&&!justCalc){
    try{const r=cmp(parseFloat(pendVal),parseFloat(cur),pendOp);expr=fmt(r)+' '+lb[op]+' ';cur=fmt(r);}
    catch(e){cur='ERROR';render();return;}
  }else{expr=cur+' '+lb[op]+' ';}
  pendVal=cur;pendOp=op;justCalc=false;cur='0';render();
}
function inputParen(p){expr+=p;render();}

function cmp(a,b,op){
  if(op==='+')return a+b;
  if(op==='-')return a-b;
  if(op==='*')return a*b;
  if(op==='/'){{if(b===0)throw'D';return a/b;}}
  if(op==='pow')return Math.pow(a,b);
  if(op==='exp')return a*Math.pow(10,b);
}

function calculate(){
  if(cur==='ERROR')return;
  let r;
  if(pendOp&&pendVal!==null){
    try{
      r=cmp(parseFloat(pendVal),parseFloat(cur),pendOp);
      const lb={'+':'+','-':'−','*':'×','/':'÷','pow':'^','exp':'×10^'};
      expr=pendVal+' '+(lb[pendOp]||pendOp)+' '+cur+' =';
    }catch(e){cur='ERROR';pendOp=null;pendVal=null;render();return;}
  }else{r=parseFloat(cur);expr=cur+' =';}
  ans=r;pendOp=null;pendVal=null;justCalc=true;
  cur=isFinite(r)?fmt(r):'ERROR';render();
}

function applyFn(fn){
  if(cur==='ERROR')return;
  const v=parseFloat(cur);
  const toR=x=>mode==='DEG'?x*Math.PI/180:x;
  const frR=x=>mode==='DEG'?x*180/Math.PI:x;
  if(fn==='pow'){pendVal=cur;pendOp='pow';expr=cur+' ^ ';cur='0';render();return;}
  if(fn==='exp'){pendVal=cur;pendOp='exp';expr=cur+' × 10^';cur='0';render();return;}
  let r,e;
  try{
    switch(fn){
      case'sin': r=Math.sin(toR(v));e='sin('+cur+')';break;
      case'cos': r=Math.cos(toR(v));e='cos('+cur+')';break;
      case'tan': r=Math.tan(toR(v));e='tan('+cur+')';break;
      case'asin':r=frR(Math.asin(v));e='sin⁻¹('+cur+')';break;
      case'acos':r=frR(Math.acos(v));e='cos⁻¹('+cur+')';break;
      case'atan':r=frR(Math.atan(v));e='tan⁻¹('+cur+')';break;
      case'log': r=Math.log10(v);e='log('+cur+')';break;
      case'ln':  r=Math.log(v);e='ln('+cur+')';break;
      case'log2':r=Math.log2(v);e='log₂('+cur+')';break;
      case'x2':  r=v*v;e=cur+'²';break;
      case'sqrt':if(v<0)throw'E';r=Math.sqrt(v);e='√('+cur+')';break;
      case'cbrt':r=Math.cbrt(v);e='∛('+cur+')';break;
      case'inv': if(v===0)throw'E';r=1/v;e='1/('+cur+')';break;
      case'fact':if(v<0||!Number.isInteger(v)||v>170)throw'E';r=fact(v);e=cur+'!';break;
      case'abs': r=Math.abs(v);e='|'+cur+'|';break;
      case'floor':r=Math.floor(v);e='⌊'+cur+'⌋';break;
      case'ceil':r=Math.ceil(v);e='⌈'+cur+'⌉';break;
      case'pct': r=v/100;e=cur+'%';break;
      case'rnd': r=Math.round(v);e='round('+cur+')';break;
      default:return;
    }
    if(!isFinite(r))throw'E';
    ans=r;expr=e;cur=fmt(r);justCalc=true;
  }catch(_){cur='ERROR';}
  render();
}

function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function insertConst(c){
  cur=c==='pi'?fmt(Math.PI):fmt(Math.E);
  expr=c==='pi'?'π':'e';justCalc=false;render();
}

function clearAll(){cur='0';expr='';pendOp=null;pendVal=null;justCalc=false;render();}
function backspace(){
  if(cur==='ERROR'||justCalc){cur='0';justCalc=false;render();return;}
  cur=cur.length===1?'0':cur.slice(0,-1);render();
}
function toggleSign(){if(cur!=='0'&&cur!=='ERROR')cur=cur.startsWith('-')?cur.slice(1):'-'+cur;render();}
function memClear(){mem=0;render();}
function memRecall(){cur=fmt(mem);justCalc=false;render();}
function memStore(){if(cur!=='ERROR'){mem=parseFloat(cur);render();}}
function memAdd(){if(cur!=='ERROR'){mem+=parseFloat(cur);render();}}
function memSub(){if(cur!=='ERROR'){mem-=parseFloat(cur);render();}}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('on',b.textContent.startsWith(m)));
  render();
}

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')inputNum(e.key);
  else if(e.key==='.')inputDot();
  else if(e.key==='+')inputOp('+');
  else if(e.key==='-')inputOp('-');
  else if(e.key==='*')inputOp('*');
  else if(e.key==='/'){e.preventDefault();inputOp('/');}
  else if(e.key==='Enter'||e.key==='=')calculate();
  else if(e.key==='Backspace')backspace();
  else if(e.key==='Escape')clearAll();
});

render();
</script>
</body>
</html>
